<!DOCTYPE html>
<html lang="en">

<head>
	<title>Untitled Synth</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<link rel="stylesheet" href="style.css">
	<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
	<style>
		/* Remove all margin and overflow */
		body {
			margin: 0;
			overflow: hidden;
		}

		/* Canvas should fill the screen */
		canvas {
			display: block;
		}

		#export-csv-btn, #load-csv-btn {
			position: fixed;
			right: 20px;
			padding: 8px 14px;
			background: rgba(0, 0, 0, 0.8);
			color: #48f9ff;
			border: 1px solid #48f9ff;
			border-radius: 4px;
			font-family: monospace;
			font-size: 12px;
			cursor: pointer;
			z-index: 500;
		}
		#export-csv-btn { top: 20px; }
		#load-csv-btn   { top: 54px; }
		#export-csv-btn:hover, #load-csv-btn:hover {
			background: rgba(72, 249, 255, 0.15);
		}

#start-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			background-color: rgba(0, 0, 0, 0.9);
			display: flex;
			justify-content: center;
			align-items: center;
			z-index: 1000;
			color: white;
		}

		#start-button {
			padding: 15px 30px;
			font-size: 1.5em;
			font-family: Arial, sans-serif;
			color: white;
			background-color: #333;
			border: 2px solid #48f9ffff;
			border-radius: 8px;
			cursor: pointer;
		}
	</style>
</head>

<body>
	<div id="fade-overlay"></div>
	<script>

		const APP_VERSION = "0.09"; // <-- Change this value in one place
	</script>

	<div id="gui-display-host"></div>
	<div id="start-overlay">

		<button id="start-button">
			<script>document.write(`Version ${APP_VERSION}`);</script>
		</button>

	</div>
	<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
					"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
				}
			}
		</script>

	<script>
		document.write(`<script type="module" src="main.js?v=${APP_VERSION}"><\/script>`);
	</script>

	<div id="debug-display"></div>

	<!-- Bottom Panel (split-screen when zoomed into display) -->
	<div id="bottom-panel">
		<div id="bottom-panel-left"></div>
		<div id="bottom-panel-right"></div>
	</div>

	<!-- Display Cell Editor -->
	<style>
		#cell-editor {
			display: none;
			position: fixed;
			top: 20px;
			left: 20px;
			background: rgba(0, 0, 0, 0.92);
			border: 1px solid #48f9ff;
			border-radius: 4px;
			color: #48f9ff;
			font-family: monospace;
			font-size: 12px;
			z-index: 600;
			min-width: 220px;
		}
		#cell-editor-header {
			padding: 8px 12px;
			border-bottom: 1px solid #48f9ff44;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		#cell-editor-body {
			padding: 12px;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}
		#cell-editor-body input[type=text] {
			background: #111;
			color: #48f9ff;
			border: 1px solid #48f9ff55;
			padding: 5px 7px;
			font-family: "Press Start 2P", monospace;
			font-size: 10px;
			width: 100%;
			box-sizing: border-box;
			text-transform: uppercase;
		}
		#cell-editor-body input[type=text]:focus {
			outline: none;
			border-color: #48f9ff;
		}
		#cell-editor-close {
			background: none;
			border: none;
			color: #48f9ff;
			cursor: pointer;
			font-size: 14px;
			padding: 0;
			line-height: 1;
		}
		#cell-editor-tip {
			padding: 6px 12px;
			border-top: 1px solid #48f9ff22;
			color: #48f9ff55;
			font-size: 10px;
			text-align: center;
		}
	</style>

	<div id="cell-editor">
		<div id="cell-editor-header">
			<span>Cell <span id="cell-editor-index"></span></span>
			<button id="cell-editor-close">&#x2715;</button>
		</div>
		<div id="cell-editor-body">
			<input type="text" id="cell-l1" placeholder="Line 1" maxlength="10" autocomplete="off" spellcheck="false">
			<input type="text" id="cell-l2" placeholder="Line 2" maxlength="10" autocomplete="off" spellcheck="false">
			<input type="text" id="cell-l3" placeholder="Line 3" maxlength="10" autocomplete="off" spellcheck="false">
		</div>
		<div id="cell-editor-tip">Press Enter to Confirm</div>
	</div>

	<button id="export-csv-btn">export.csv</button>
	<button id="load-csv-btn">load.csv</button>
	<input type="file" id="load-csv-input" accept=".csv" style="display:none">

	<script>
		document.getElementById('export-csv-btn').addEventListener('click', async () => {
			const csv = window._exportDisplaysCSV ? window._exportDisplaysCSV() : '';
			if (!csv) { alert('No display data to export.'); return; }

			if (window.showSaveFilePicker) {
				try {
					const handle = await window.showSaveFilePicker({
						suggestedName: 'displays.csv',
						types: [{ description: 'CSV File', accept: { 'text/csv': ['.csv'] } }]
					});
					const writable = await handle.createWritable();
					await writable.write(csv);
					await writable.close();
				} catch (e) {
					if (e.name !== 'AbortError') console.error('Save failed:', e);
				}
			} else {
				// Fallback for browsers without File System Access API
				const blob = new Blob([csv], { type: 'text/csv' });
				const url = URL.createObjectURL(blob);
				const a = document.createElement('a');
				a.href = url;
				a.download = 'displays.csv';
				a.click();
				URL.revokeObjectURL(url);
			}
		});
	</script>

	<script>
		document.getElementById('load-csv-btn').addEventListener('click', () => {
			document.getElementById('load-csv-input').click();
		});
		document.getElementById('load-csv-input').addEventListener('change', (e) => {
			const file = e.target.files[0];
			if (!file) return;
			const reader = new FileReader();
			reader.onload = (ev) => {
				if (window._loadDisplaysCSV) window._loadDisplaysCSV(ev.target.result);
			};
			reader.readAsText(file);
			e.target.value = ''; // reset so same file can be reloaded
		});
	</script>

	<script>
		(function () {
			let editingDisplay = null;
			let editingCell = null;

			window._openCellEditor = function (displayName, cellIndex) {
				editingDisplay = displayName;
				editingCell = cellIndex;

				const screenKey = window._getCurrentScreenKey ? window._getCurrentScreenKey() : null;
				const data = screenKey && window._allDisplayScreensData
					? window._allDisplayScreensData.get(displayName)?.get(screenKey)
					: null;
				const cell = (data && data[cellIndex]) || ['', '', ''];

				document.getElementById('cell-editor-index').textContent = cellIndex + 1;
				document.getElementById('cell-l1').value = cell[0] || '';
				document.getElementById('cell-l2').value = cell[1] || '';
				document.getElementById('cell-l3').value = cell[2] || '';

				document.getElementById('cell-editor').style.display = 'block';
				document.getElementById('cell-l1').focus();
			};

			function applyEdit() {
				if (editingDisplay === null || editingCell === null) return;
				const screenKey = window._getCurrentScreenKey ? window._getCurrentScreenKey() : null;
				if (!screenKey || !window._allDisplayScreensData) return;
				const data = window._allDisplayScreensData.get(editingDisplay)?.get(screenKey);
				if (!data) return;

				data[editingCell] = [
					document.getElementById('cell-l1').value,
					document.getElementById('cell-l2').value,
					document.getElementById('cell-l3').value,
				];

				if (window._refreshDisplay) window._refreshDisplay();
			}

			['cell-l1', 'cell-l2', 'cell-l3'].forEach(id => {
				document.getElementById(id).addEventListener('input', applyEdit);
			});

			document.getElementById('cell-editor-close').addEventListener('click', () => {
				document.getElementById('cell-editor').style.display = 'none';
			});

			document.addEventListener('keydown', e => {
				if (e.key === 'Escape' || e.key === 'Enter') {
					document.getElementById('cell-editor').style.display = 'none';
				}
			});
		})();
	</script>


</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
	<title>Untitled Synth</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<link rel="stylesheet" href="style.css">
	<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
	<style>
		/* Remove all margin and overflow */
		body {
			margin: 0;
			overflow: hidden;
		}

		/* Canvas should fill the screen */
		canvas {
			display: block;
		}

		#export-csv-btn, #load-csv-btn {
			position: fixed;
			right: 20px;
			padding: 8px 14px;
			background: rgba(0, 0, 0, 0.8);
			color: #48f9ff;
			border: 1px solid #48f9ff;
			border-radius: 4px;
			font-family: monospace;
			font-size: 12px;
			cursor: pointer;
			z-index: 500;
		}
		#export-csv-btn { top: 20px; }
		#load-csv-btn   { top: 54px; }
		#export-csv-btn:hover, #load-csv-btn:hover {
			background: rgba(72, 249, 255, 0.15);
		}

#start-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			background-color: rgba(0, 0, 0, 0.9);
			display: flex;
			justify-content: center;
			align-items: center;
			z-index: 1000;
			color: white;
		}

		#start-button {
			padding: 15px 30px;
			font-size: 1.5em;
			font-family: Arial, sans-serif;
			color: white;
			background-color: #333;
			border: 2px solid #48f9ffff;
			border-radius: 8px;
			cursor: pointer;
		}
	</style>
</head>

<body>
	<div id="fade-overlay"></div>
	<script>

		const APP_VERSION = "0.03"; // <-- Change this value in one place
	</script>

	<div id="gui-display-host"></div>
	<div id="start-overlay">

		<button id="start-button">
			<script>document.write(`Version ${APP_VERSION}`);</script>
		</button>

	</div>
	<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
					"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
				}
			}
		</script>

	<script>
		document.write(`<script type="module" src="main.js?v=${APP_VERSION}"><\/script>`);
	</script>

	<div id="debug-display"></div>

	<!-- Bottom Panel (split-screen when zoomed into display) -->
	<div id="bottom-panel">
		<div id="bottom-panel-left"></div>
		<div id="bottom-panel-right"></div>
	</div>

	<!-- Bottom Camera Editor -->
	<style>
		#split-editor {
			position: fixed;
			bottom: 20px;
			right: 20px;
			background: rgba(0,0,0,0.85);
			border: 1px solid #48f9ff;
			border-radius: 4px;
			color: #48f9ff;
			font-family: monospace;
			font-size: 11px;
			z-index: 500;
			min-width: 280px;
			display: none;
		}
		#split-editor.visible { display: block; }
		#split-editor-header {
			padding: 8px 12px;
			cursor: pointer;
			user-select: none;
			border-bottom: 1px solid #48f9ff44;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		#split-editor-body { padding: 10px 12px; display: none; }
		#split-editor-body.open { display: block; }
		.bce-section {
			margin-bottom: 6px;
			color: #48f9ff88;
			text-transform: uppercase;
			font-size: 10px;
			letter-spacing: 1px;
		}
		.bce-row {
			display: flex;
			align-items: center;
			gap: 6px;
			margin-bottom: 6px;
		}
		.bce-row label { width: 30px; }
		.bce-row input[type=range] { flex: 1; accent-color: #48f9ff; }
		.bce-row .val { width: 48px; text-align: right; }
	</style>

	<div id="split-editor">
		<div id="split-editor-header">
			<span>Bottom Camera</span>
			<span id="split-editor-toggle">▲</span>
		</div>
		<div id="split-editor-body">
			<div class="bce-section">Position</div>
			<div class="bce-row"><label>X</label><input type="range" id="bce-px" min="-30" max="30" step="0.1" value="0"><span class="val" id="bce-px-v">0.0</span></div>
			<div class="bce-row"><label>Y</label><input type="range" id="bce-py" min="-30" max="30" step="0.1" value="15"><span class="val" id="bce-py-v">15.0</span></div>
			<div class="bce-row"><label>Z</label><input type="range" id="bce-pz" min="-30" max="30" step="0.1" value="0"><span class="val" id="bce-pz-v">0.0</span></div>

			<div class="bce-section">Look At</div>
			<div class="bce-row"><label>X</label><input type="range" id="bce-lx" min="-20" max="20" step="0.1" value="0"><span class="val" id="bce-lx-v">0.0</span></div>
			<div class="bce-row"><label>Y</label><input type="range" id="bce-ly" min="-20" max="20" step="0.1" value="0"><span class="val" id="bce-ly-v">0.0</span></div>
			<div class="bce-row"><label>Z</label><input type="range" id="bce-lz" min="-20" max="20" step="0.1" value="0"><span class="val" id="bce-lz-v">0.0</span></div>

			<div class="bce-section">Up Vector</div>
			<div class="bce-row"><label>X</label><input type="range" id="bce-ux" min="-1" max="1" step="0.05" value="0"><span class="val" id="bce-ux-v">0.0</span></div>
			<div class="bce-row"><label>Y</label><input type="range" id="bce-uy" min="-1" max="1" step="0.05" value="0"><span class="val" id="bce-uy-v">0.0</span></div>
			<div class="bce-row"><label>Z</label><input type="range" id="bce-uz" min="-1" max="1" step="0.05" value="-1"><span class="val" id="bce-uz-v">-1.0</span></div>
		</div>
	</div>

	<script>
		(function () {
			const header = document.getElementById('split-editor-header');
			const body = document.getElementById('split-editor-body');
			const toggle = document.getElementById('split-editor-toggle');

			header.addEventListener('click', () => {
				const open = body.classList.toggle('open');
				toggle.textContent = open ? '▼' : '▲';
			});

			const sliders = [
				['bce-px','posX'], ['bce-py','posY'], ['bce-pz','posZ'],
				['bce-lx','lookX'], ['bce-ly','lookY'], ['bce-lz','lookZ'],
				['bce-ux','upX'], ['bce-uy','upY'], ['bce-uz','upZ'],
			];

			sliders.forEach(([id, key]) => {
				document.getElementById(id).addEventListener('input', () => {
					const v = parseFloat(document.getElementById(id).value);
					document.getElementById(id + '-v').textContent = v.toFixed(1);
					if (window._bottomCamConfig) {
						window._bottomCamConfig[key] = v;
					}
				});
			});
		})();
	</script>

	<!-- Display Cell Editor -->
	<style>
		#cell-editor {
			display: none;
			position: fixed;
			top: 20px;
			left: 20px;
			background: rgba(0, 0, 0, 0.92);
			border: 1px solid #48f9ff;
			border-radius: 4px;
			color: #48f9ff;
			font-family: monospace;
			font-size: 12px;
			z-index: 600;
			min-width: 220px;
		}
		#cell-editor-header {
			padding: 8px 12px;
			border-bottom: 1px solid #48f9ff44;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		#cell-editor-body {
			padding: 12px;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}
		#cell-editor-body input[type=text] {
			background: #111;
			color: #48f9ff;
			border: 1px solid #48f9ff55;
			padding: 5px 7px;
			font-family: "Press Start 2P", monospace;
			font-size: 10px;
			width: 100%;
			box-sizing: border-box;
			text-transform: uppercase;
		}
		#cell-editor-body input[type=text]:focus {
			outline: none;
			border-color: #48f9ff;
		}
		#cell-editor-close {
			background: none;
			border: none;
			color: #48f9ff;
			cursor: pointer;
			font-size: 14px;
			padding: 0;
			line-height: 1;
		}
		#cell-editor-tip {
			padding: 6px 12px;
			border-top: 1px solid #48f9ff22;
			color: #48f9ff55;
			font-size: 10px;
			text-align: center;
		}
	</style>

	<div id="cell-editor">
		<div id="cell-editor-header">
			<span>Cell <span id="cell-editor-index"></span></span>
			<button id="cell-editor-close">&#x2715;</button>
		</div>
		<div id="cell-editor-body">
			<input type="text" id="cell-l1" placeholder="Line 1" maxlength="10" autocomplete="off" spellcheck="false">
			<input type="text" id="cell-l2" placeholder="Line 2" maxlength="10" autocomplete="off" spellcheck="false">
			<input type="text" id="cell-l3" placeholder="Line 3" maxlength="10" autocomplete="off" spellcheck="false">
		</div>
		<div id="cell-editor-tip">Press Enter to Confirm</div>
	</div>

	<button id="export-csv-btn">export.csv</button>
	<button id="load-csv-btn">load.csv</button>
	<input type="file" id="load-csv-input" accept=".csv" style="display:none">

	<script>
		document.getElementById('export-csv-btn').addEventListener('click', async () => {
			const csv = window._exportDisplaysCSV ? window._exportDisplaysCSV() : '';
			if (!csv) { alert('No display data to export.'); return; }

			if (window.showSaveFilePicker) {
				try {
					const handle = await window.showSaveFilePicker({
						suggestedName: 'displays.csv',
						types: [{ description: 'CSV File', accept: { 'text/csv': ['.csv'] } }]
					});
					const writable = await handle.createWritable();
					await writable.write(csv);
					await writable.close();
				} catch (e) {
					if (e.name !== 'AbortError') console.error('Save failed:', e);
				}
			} else {
				// Fallback for browsers without File System Access API
				const blob = new Blob([csv], { type: 'text/csv' });
				const url = URL.createObjectURL(blob);
				const a = document.createElement('a');
				a.href = url;
				a.download = 'displays.csv';
				a.click();
				URL.revokeObjectURL(url);
			}
		});
	</script>

	<script>
		document.getElementById('load-csv-btn').addEventListener('click', () => {
			document.getElementById('load-csv-input').click();
		});
		document.getElementById('load-csv-input').addEventListener('change', (e) => {
			const file = e.target.files[0];
			if (!file) return;
			const reader = new FileReader();
			reader.onload = (ev) => {
				if (window._loadDisplaysCSV) window._loadDisplaysCSV(ev.target.result);
			};
			reader.readAsText(file);
			e.target.value = ''; // reset so same file can be reloaded
		});
	</script>

	<script>
		(function () {
			let editingDisplay = null;
			let editingCell = null;

			window._openCellEditor = function (displayName, cellIndex) {
				editingDisplay = displayName;
				editingCell = cellIndex;

				const screenKey = window._getCurrentScreenKey ? window._getCurrentScreenKey() : null;
				const data = screenKey && window._allDisplayScreensData
					? window._allDisplayScreensData.get(displayName)?.get(screenKey)
					: null;
				const cell = (data && data[cellIndex]) || ['', '', ''];

				document.getElementById('cell-editor-index').textContent = cellIndex + 1;
				document.getElementById('cell-l1').value = cell[0] || '';
				document.getElementById('cell-l2').value = cell[1] || '';
				document.getElementById('cell-l3').value = cell[2] || '';

				document.getElementById('cell-editor').style.display = 'block';
				document.getElementById('cell-l1').focus();
			};

			function applyEdit() {
				if (editingDisplay === null || editingCell === null) return;
				const screenKey = window._getCurrentScreenKey ? window._getCurrentScreenKey() : null;
				if (!screenKey || !window._allDisplayScreensData) return;
				const data = window._allDisplayScreensData.get(editingDisplay)?.get(screenKey);
				if (!data) return;

				data[editingCell] = [
					document.getElementById('cell-l1').value,
					document.getElementById('cell-l2').value,
					document.getElementById('cell-l3').value,
				];

				if (window._refreshDisplay) window._refreshDisplay();
			}

			['cell-l1', 'cell-l2', 'cell-l3'].forEach(id => {
				document.getElementById(id).addEventListener('input', applyEdit);
			});

			document.getElementById('cell-editor-close').addEventListener('click', () => {
				document.getElementById('cell-editor').style.display = 'none';
			});

			document.addEventListener('keydown', e => {
				if (e.key === 'Escape' || e.key === 'Enter') {
					document.getElementById('cell-editor').style.display = 'none';
				}
			});
		})();
	</script>

	<!-- Display Zoom Tuner -->
	<style>
		#zoom-editor {
			position: fixed;
			bottom: 20px;
			left: 20px;
			background: rgba(0,0,0,0.85);
			border: 1px solid #48f9ff;
			border-radius: 4px;
			color: #48f9ff;
			font-family: monospace;
			font-size: 11px;
			z-index: 500;
			min-width: 280px;
		}
		#zoom-editor-header {
			padding: 8px 12px;
			cursor: pointer;
			user-select: none;
			border-bottom: 1px solid #48f9ff44;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		#zoom-editor-body { padding: 10px 12px; display: none; }
		#zoom-editor-body.open { display: block; }
		.ze-section {
			margin-bottom: 6px;
			color: #48f9ff88;
			text-transform: uppercase;
			font-size: 10px;
			letter-spacing: 1px;
		}
		.ze-row {
			display: flex;
			align-items: center;
			gap: 6px;
			margin-bottom: 6px;
		}
		.ze-row label { width: 60px; }
		.ze-row input[type=text] {
			flex: 1;
			background: #111;
			color: #48f9ff;
			border: 1px solid #48f9ff55;
			padding: 2px 4px;
			font-family: monospace;
			font-size: 11px;
		}
		.ze-row input[type=range] { flex: 1; accent-color: #48f9ff; }
		.ze-row .val { width: 48px; text-align: right; }
		#zoom-output {
			margin-top: 8px;
			padding-top: 8px;
			border-top: 1px solid #48f9ff44;
			line-height: 1.6;
			word-break: break-all;
			color: #48f9ffcc;
		}
		#zoom-apply {
			margin-top: 8px;
			width: 100%;
			padding: 5px;
			background: #001f1f;
			color: #48f9ff;
			border: 1px solid #48f9ff;
			cursor: pointer;
			font-family: monospace;
			font-size: 11px;
		}
		#zoom-apply:hover { background: #003333; }
	</style>
	<div id="zoom-editor">
		<div id="zoom-editor-header">
			<span>Display Zoom Tuner</span>
			<span id="zoom-editor-toggle">▲</span>
		</div>
		<div id="zoom-editor-body">
			<div class="ze-section">Anchor Object</div>
			<div class="ze-row">
				<label>Name</label>
				<input type="text" id="ze-target" value="Display01">
			</div>

			<div class="ze-section">Approach Normal</div>
			<div class="ze-row"><label>X</label><input type="range" id="ze-nx" min="-1" max="1" step="0.05" value="0"><span class="val" id="ze-nx-v">0</span></div>
			<div class="ze-row"><label>Y</label><input type="range" id="ze-ny" min="-1" max="1" step="0.05" value="1"><span class="val" id="ze-ny-v">1</span></div>
			<div class="ze-row"><label>Z</label><input type="range" id="ze-nz" min="-1" max="1" step="0.05" value="0"><span class="val" id="ze-nz-v">0</span></div>

			<div class="ze-section">Offset Distance</div>
			<div class="ze-row"><label>Dist</label><input type="range" id="ze-dist" min="1" max="60" step="0.5" value="15"><span class="val" id="ze-dist-v">15</span></div>

			<div class="ze-section">LookAt Offset</div>
			<div class="ze-row"><label>X</label><input type="range" id="ze-lx" min="-10" max="10" step="0.1" value="0"><span class="val" id="ze-lx-v">0</span></div>
			<div class="ze-row"><label>Y</label><input type="range" id="ze-ly" min="-10" max="10" step="0.1" value="0"><span class="val" id="ze-ly-v">0</span></div>
			<div class="ze-row"><label>Z</label><input type="range" id="ze-lz" min="-10" max="10" step="0.1" value="0"><span class="val" id="ze-lz-v">0</span></div>

			<div class="ze-section">Camera Up Vector</div>
			<div class="ze-row"><label>X</label><input type="range" id="ze-ux" min="-1" max="1" step="0.05" value="0"><span class="val" id="ze-ux-v">0</span></div>
			<div class="ze-row"><label>Y</label><input type="range" id="ze-uy" min="-1" max="1" step="0.05" value="0"><span class="val" id="ze-uy-v">0</span></div>
			<div class="ze-row"><label>Z</label><input type="range" id="ze-uz" min="-1" max="1" step="0.05" value="-1"><span class="val" id="ze-uz-v">-1</span></div>

			<button id="zoom-apply">Apply (re-zoom)</button>

			<div id="zoom-output">Adjust sliders then click Apply.</div>
		</div>
	</div>
	<script>
		(function () {
			const header = document.getElementById('zoom-editor-header');
			const body = document.getElementById('zoom-editor-body');
			const toggle = document.getElementById('zoom-editor-toggle');

			header.addEventListener('click', () => {
				const open = body.classList.toggle('open');
				toggle.textContent = open ? '▼' : '▲';
			});

			const sliders = [
				['ze-nx','normalX'], ['ze-ny','normalY'], ['ze-nz','normalZ'],
				['ze-dist','offsetDist'],
				['ze-lx','lookAtOffsetX'], ['ze-ly','lookAtOffsetY'], ['ze-lz','lookAtOffsetZ'],
				['ze-ux','upX'], ['ze-uy','upY'], ['ze-uz','upZ'],
			];

			function syncToConfig() {
				const cfg = window._displayZoomConfig;
				if (!cfg) return;
				cfg.targetName = document.getElementById('ze-target').value.trim();
				sliders.forEach(([id, key]) => {
					cfg[key] = parseFloat(document.getElementById(id).value);
					document.getElementById(id + '-v').textContent = cfg[key];
				});
			}

			function updateOutput() {
				const cfg = window._displayZoomConfig;
				if (!cfg) return;
				document.getElementById('zoom-output').textContent =
					`targetName: "${cfg.targetName}"\n` +
					`normal: (${cfg.normalX}, ${cfg.normalY}, ${cfg.normalZ})\n` +
					`offsetDist: ${cfg.offsetDist}\n` +
					`lookAtOffset: (${cfg.lookAtOffsetX}, ${cfg.lookAtOffsetY}, ${cfg.lookAtOffsetZ})\n` +
					`up: (${cfg.upX}, ${cfg.upY}, ${cfg.upZ})`;
			}

			sliders.forEach(([id]) => {
				document.getElementById(id).addEventListener('input', () => {
					syncToConfig();
					updateOutput();
				});
			});
			document.getElementById('ze-target').addEventListener('input', () => {
				syncToConfig();
				updateOutput();
			});

			document.getElementById('zoom-apply').addEventListener('click', () => {
				syncToConfig();
				updateOutput();
				if (window._retriggerDisplayZoom) window._retriggerDisplayZoom();
			});
		})();
	</script>

</body>

</html>
